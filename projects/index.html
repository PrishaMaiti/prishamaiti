<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Prisha Maiti</title>
    <link rel="stylesheet" href="../style.css">
        <style>
        #projects-pie-plot {
            max-width: 20em;
            width: 100%;
            height: auto;
            margin-block: 2em;
            overflow: visible;
            display: block;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }

        .pie-legend-container {
          display: flex;
          gap: 1rem;
          align-items: center;
          flex-wrap: wrap;
        }

        .legend {
          list-style: none;
          padding: 0.5rem;
          margin: 0;
          border: 1px solid rgba(0,0,0,0.06);
          border-radius: 6px;
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(9em, 1fr));
          gap: 0.5rem;
          flex: 1 1 12rem;
        }

        .legend-item {
          display: flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.25rem 0.5rem;
          border-radius: 4px;
        }

        #projects-pie-plot path {
          transition: 300ms;
          cursor: pointer;
        }

        #projects-pie-plot:has(path:hover) path:not(:hover) {
          opacity: 0.5;
        }

        .selected {
          outline: 2px solid oklch(60% 45% 0);
          outline-offset: 2px;
        }

        path.selected {
          stroke: oklch(60% 45% 0);
          stroke-width: 3;
        }

        .selected.legend-item {
          font-weight: 600;
          background: color-mix(in oklab, oklch(60% 45% 0) 12%, transparent);
        }

        .swatch {
          width: 1em;
          height: 1em;
          display: inline-block;
          background: var(--color, #ccc);
          border-radius: 0.25em;
        }

        .searchBar {
          padding: 0.5em 0.75em;
          font-size: 1em;
          border: 1px solid #ddd;
          border-radius: 4px;
          width: 100%;
          max-width: 20em;
          margin-block: 1em 2em;
        }
        </style>
</head>
<body>
    <h1 class="projects-title">Projects</h1>

    <input
      class="searchBar"
      type="search"
      aria-label="Search projects"
      placeholder="🔍 Search projects…"
    />

        <div class="projects"></div>

    <script src="../global.js" type="module"></script>
    <script src="projects.js" type="module"></script>
</body>
</html>
